services:
  pd:
    image: pingcap/pd:latest
    container_name: pd-manga-platform
    command:
      - --name=pd1
      - --client-urls=http://0.0.0.0:2379
      - --peer-urls=http://0.0.0.0:2380
      - --advertise-client-urls=http://pd:2379
      - --advertise-peer-urls=http://pd:2380
      - --initial-cluster=pd1=http://pd:2380
      - --data-dir=/data/pd # Importante para persistência
    ports:
      - "2379:2379"
    networks:
      - manga-platform

  tikv:
    image: pingcap/tikv:latest
    container_name: tikv-manga-platform
    command:
      - --pd=pd:2379
      - --addr=0.0.0.0:20160
      - --advertise-addr=tikv:20160
      - --data-dir=/data/tikv
    depends_on:
      - pd
    networks:
      - manga-platform

  tidb:
    image: pingcap/tidb:latest
    container_name: tidb-server-manga-platform
    command:
      - --store=tikv
      - --path=pd:2379
    ports:
      - "4000:4000"
    depends_on:
      - tikv
    networks:
      - manga-platform

networks:
  manga-platform:
    driver: bridge