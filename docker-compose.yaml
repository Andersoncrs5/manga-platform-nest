services:
  pd:
    image: pingcap/pd:latest
    container_name: pd-manga-platform
    command:
      - --name=pd1
      - --client-urls=http://0.0.0.0:2379
      - --peer-urls=http://0.0.0.0:2380
      - --advertise-client-urls=http://pd:2379
      - --advertise-peer-urls=http://pd:2380
      - --initial-cluster=pd1=http://pd:2380
      - --data-dir=/data
    ports:
      - "2379:2379"
    volumes:
      - pd_data:/data
    networks:
      - manga-platform

  tikv:
    image: pingcap/tikv:latest
    container_name: tikv-manga-platform
    command:
      - --pd=pd:2379
      - --addr=0.0.0.0:20160
      - --advertise-addr=tikv:20160
      - --data-dir=/data
    volumes:
      - tikv_data:/data
    depends_on:
      - pd
    networks:
      - manga-platform

  tidb:
    image: pingcap/tidb:latest
    container_name: tidb-server-manga-platform
    command:
      - --store=tikv
      - --path=pd:2379
    ports:
      - "4000:4000"
    depends_on:
      - tikv
    networks:
      - manga-platform

  dragonfly:
    container_name: dragonfly-manga-platform
    image: 'docker.dragonflydb.io/dragonflydb/dragonfly'
    # Adicionei o --bind para garantir que ele escute na rede do docker
    command: ["dragonfly", "--logtostderr", "--dir", "/data", "--bind", "0.0.0.0"]
    ulimits:
      memlock: -1
      nofile:
        soft: 65535
        hard: 65535
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - dragonfly_data:/data
    networks:
      - manga-platform

networks:
  manga-platform:
    driver: bridge

volumes:
  pd_data:
  tikv_data:
  dragonfly_data:
